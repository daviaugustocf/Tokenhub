<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davi-Token Factory v3.0</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .container { background-color: #161b22; border: 2px solid #30363d; border-radius: 15px; padding: 20px; max-width: 450px; display: inline-block; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; }
        .inventory { text-align: left; background: #0d1117; padding: 15px; border-radius: 10px; margin: 20px 0; max-height: 200px; overflow-y: auto; }
        .token-item { display: flex; justify-content: space-between; margin: 10px 0; font-size: 18px; padding-bottom: 5px; border-bottom: 1px solid #30363d; }
        .controls, .factory { background: #21262d; padding: 15px; border-radius: 10px; margin-top: 10px; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #30363d; margin: 5px; font-weight: bold; }
        input, select { background: #0d1117; color: white; width: 80%; }
        button { cursor: pointer; transition: 0.2s; }
        .btn-add { background: #238636; color: white; }
        .btn-del { background: #da3633; color: white; }
        .btn-create { background: #8957e5; color: white; width: 90%; }
        .delete-token { color: #ff7b72; cursor: pointer; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏗️ DAVI TOKEN FACTORY 🏗️</h1>
        
        <div class="inventory" id="inventoryList">
            </div>

        <div class="factory">
            <h3>🔨 Criar Novo Tipo</h3>
            <input type="text" id="newTokenName" placeholder="Nome do Token (ex: Ultra Token)">
            <button class="btn-create" onclick="createToken()">FORJAR NOVO TOKEN</button>
        </div>

        <div class="controls">
            <h3>🕹️ Painel de Controle</h3>
            <select id="tokenSelector">
                </select>
            <br>
            <button class="btn-add" onclick="updateAmount(1)">➕ ADICIONAR</button>
            <button class="btn-del" onclick="updateAmount(-1)">➖ REMOVER</button>
        </div>
        
        <button onclick="resetSystem()" style="background:none; border:none; color:#58a6ff; font-size:10px; margin-top:20px; cursor:pointer;">[ Resetar Banco de Dados ]</button>
    </div>

    <script>
        // Banco de Dados Dinâmico
        let wallet = JSON.parse(localStorage.getItem('daviFactory')) || {
            "Swap Token": 0,
            "Admin Token": 0
        };

        function refreshUI() {
            const list = document.getElementById('inventoryList');
            const selector = document.getElementById('tokenSelector');
            list.innerHTML = '';
            selector.innerHTML = '';

            for (let token in wallet) {
                // Atualiza Lista
                list.innerHTML += `
                    <div class="token-item">
                        <span>🪙 ${token}: <b>${wallet[token]}</b></span>
                        <span class="delete-token" onclick="deleteTokenType('${token}')">[X] Deletar Tipo</span>
                    </div>`;
                
                // Atualiza Selector
                let option = document.createElement('option');
                option.value = token;
                option.innerText = token;
                selector.appendChild(option);
            }
            save();
        }

        function createToken() {
            const name = document.getElementById('newTokenName').value.trim();
            if (name === "") return alert("Digite um nome!");
            if (wallet[name] !== undefined) return alert("Esse token já existe!");
            
            wallet[name] = 0;
            document.getElementById('newTokenName').value = "";
            refreshUI();
        }

        function updateAmount(amt) {
            const selected = document.getElementById('tokenSelector').value;
            if (!selected) return;
            if (amt < 0 && wallet[selected] <= 0) return alert("Saldo insuficiente!");
            
            wallet[selected] += amt;
            refreshUI();
        }

        function deleteTokenType(token) {
            if (confirm(`Deseja EXCLUIR permanentemente o tipo "${token}"?`)) {
                delete wallet[token];
                refreshUI();
            }
        }

        function save() { localStorage.setItem('daviFactory', JSON.stringify(wallet)); }
        function resetSystem() { if(confirm("Zerar tudo?")) { wallet = {"Swap Token":0}; refreshUI(); } }

        refreshUI(); // Inicia o sistema
    </script>
</body>
</html>
